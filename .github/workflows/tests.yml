name: Automated Tests

on: pull_request

jobs:
  jest:
    name: Bun Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/hydrogen"

      - uses: oven-sh/setup-bun@v1 # Add this step

      - run: bun ci

      - run: bun test
